services:
  postgres:
    image: postgres:16-alpine
    container_name: datasphere-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datasphere_platform}
      POSTGRES_USER: ${POSTGRES_USER:-datasphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datasphere} -d ${POSTGRES_DB:-datasphere_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./platform/backend
    container_name: datasphere-backend
    env_file:
      - .env
    environment:
      # CRITICAL: Override DATABASE_URL to use Docker service name "postgres".
      # "localhost" inside a container points to the container itself, NOT to PostgreSQL.
      # This variable always wins over the value in .env.
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-datasphere}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-datasphere_platform}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./platform/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ./platform/frontend
    container_name: datasphere-frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./platform/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
