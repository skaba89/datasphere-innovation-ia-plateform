# render.yaml — DataSphere Innovation IA Platform
# Render Blueprint : décrit l'intégralité de l'infrastructure
#
# Déploiement :
#   1. Connecter le repo GitHub à Render
#   2. Render détecte ce fichier → propose de créer tous les services
#   3. Régler les variables sensibles dans le dashboard (SECRET_KEY, STRIPE_*, SMTP_*, etc.)
#
# Services créés :
#   - datasphere-db       : PostgreSQL 16 managé (plan starter — 7$/mois, backups quotidiens)
#   - datasphere-backend  : API FastAPI Docker (plan starter — 7$/mois, pas de cold start)
#   - datasphere-frontend : Site statique React/Vite (gratuit — CDN, pas de cold start)
#   - datasphere-website  : Landing page statique (gratuit — CDN, pas de cold start)
#
# Coût mensuel infra de base : ~14$/mois (DB + backend starter)
# Coûts variables : Stripe (2.9%+0.25€/transaction), Render bande passante au-delà du quota gratuit
#
# Docs Render Blueprints : https://render.com/docs/blueprint-spec

databases:
  - name: datasphere-db
    databaseName: datasphere_platform
    user: datasphere
    plan: starter          # Backups automatiques quotidiens + meilleures perfs (7$/mois)
    region: frankfurt      # Le plus proche de la France

services:

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  - type: web
    name: datasphere-backend
    runtime: docker
    dockerfilePath: ./platform/backend/Dockerfile.render
    dockerContext: ./platform/backend
    region: frankfurt
    plan: starter           # Pas de cold start (sleep après 15min sur free) — critique en prod
    healthCheckPath: /api/v1/health

    envVars:
      # Base de données — injectée automatiquement par Render
      - key: DATABASE_URL
        fromDatabase:
          name: datasphere-db
          property: connectionString

      # Sécurité — à générer une fois
      - key: SECRET_KEY
        generateValue: true    # Render génère une valeur aléatoire sécurisée

      # Environment
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"

      # CORS — URL réelle du frontend (suffixe Render auto-généré)
      - key: CORS_ORIGINS
        value: https://datasphere-frontend-n1mb.onrender.com

      # Stripe (optionnel — laisser vide pour désactiver)
      - key: STRIPE_SECRET_KEY
        value: ""           # sk_live_xxx — à renseigner dans le dashboard
      - key: STRIPE_WEBHOOK_SECRET
        value: ""           # whsec_xxx

      # Email — Resend (recommandé, gratuit 3000/mois) ou SMTP
      - key: RESEND_API_KEY
        value: ""           # re_xxx — https://resend.com (prioritaire sur SMTP si défini)
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM
        value: "noreply@datasphere-innovation.fr"

      # Setup endpoint — init DB + admin sans accès Shell
      # Générer un token aléatoire : openssl rand -hex 16
      - key: SETUP_SECRET_KEY
        generateValue: true
      - key: SETUP_ENABLED
        value: "false"

      # Scheduler BOAMP
      # LinkedIn OAuth2 (optionnel — pour publier directement sur LinkedIn)
      - key: LINKEDIN_CLIENT_ID
        value: ""
      - key: LINKEDIN_CLIENT_SECRET
        value: ""
      - key: LINKEDIN_REDIRECT_URI
        value: "https://datasphere-backend-zl3v.onrender.com/api/v1/linkedin/oauth/callback"

      # Sentry error tracking (optionnel — https://sentry.io)
      - key: SENTRY_DSN
        value: ""
      - key: SCHEDULER_ENABLED
        value: "true"   # Activé — jobs: BOAMP scan 6h, rapport 7h, hebdo lundi 8h
      - key: BOAMP_SCAN_ENABLED
        value: "true"
      - key: BOAMP_KEYWORDS
        value: "data informatique numérique IA intelligence artificielle machine learning"
      - key: BOAMP_SCORE_THRESHOLD
        value: "70"
      - key: BOAMP_DAILY_LIMIT
        value: "50"   # Scan BOAMP quotidien 6h du matin

      # LLM — au moins un recommandé (GROQ et GEMINI sont gratuits, à prioriser)
      - key: GROQ_API_KEY
        value: ""           # https://console.groq.com — 14 400 req/jour gratuit, latence <1s
      - key: GEMINI_API_KEY
        value: ""           # https://aistudio.google.com — 1500 req/jour gratuit, contexte 1M tokens
      - key: OPENAI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  - type: web
    name: datasphere-frontend
    runtime: static
    rootDir: platform/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    headers:
      # Sécurité
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Cache long terme pour les assets hashés
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Pas de cache pour index.html
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store

    routes:
      # SPA routing — toutes les routes → index.html
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # URL de l'API backend — URL réelle avec suffixe Render
      - key: VITE_API_BASE_URL
        value: https://datasphere-backend-zl3v.onrender.com/api/v1

  # ── Landing page / Website ──────────────────────────────────────────────────
  - type: web
    name: datasphere-website
    runtime: static
    staticPublishPath: ./website
    buildCommand: ""   # Site statique — aucun build requis
    region: frankfurt
    plan: free              # OK en free — site statique servi par CDN, aucun cold start
    pullRequestPreviewsEnabled: false
    headers:
      - path: "/*"
        name: Cache-Control
        value: "public, max-age=3600"
      - path: "/*"
        name: X-Frame-Options
        value: DENY
    routes:
      # Sert /status.html directement (page de statut public)
      - type: rewrite
        source: "/status"
        destination: /status.html
      # Fallback SPA pour tout le reste
      - type: rewrite
        source: "/*"
        destination: /index.html
