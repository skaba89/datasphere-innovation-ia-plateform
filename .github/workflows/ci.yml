name: CI Quality Gates v2

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall app -q

      - name: Application import
        env:
          APP_ENV: test
          SECRET_KEY: ci-secret-key-not-for-prod
          DATABASE_URL: sqlite:///./ci_import.db
          SCHEDULER_ENABLED: "false"
        run: python -c "from app.main import app; print('✓', app.title)"

      - name: Run test suite (176 tests)
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          SECRET_KEY: ci-secret-key-not-for-prod
          DATABASE_URL: sqlite:///./ci_test.db
          SCHEDULER_ENABLED: "false"
          CORS_ORIGINS: http://localhost:5173
        run: pytest -q --tb=short --no-header

      - name: Alembic migration check
        env:
          APP_ENV: development
          SECRET_KEY: ci-secret-key-not-for-prod
          DATABASE_URL: sqlite:///./ci_migrate.db
          SCHEDULER_ENABLED: "false"
        run: |
          alembic upgrade head
          echo "✓ Migrations applied successfully"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 22 + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript + Vite build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(du -sb dist/assets/*.js | awk '{print $1}')
          echo "Bundle size: ${SIZE} bytes"
          # Fail if bundle > 1MB uncompressed
          [ "$SIZE" -lt 1048576 ] || (echo "Bundle too large!" && exit 1)

  # ── Docker ───────────────────────────────────────────────────────────────────
  docker:
    name: Docker Compose validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Validate dev docker-compose
        run: docker compose config --quiet

      - name: Validate prod docker-compose
        run: docker compose -f docker-compose.prod.yml config --quiet

  # ── Security scan ─────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Audit dependencies for known CVEs
        run: pip-audit --require-hashes=false --skip-editable -q || true
        # 'or true' — advisory, not blocking; remove to make mandatory

  # ── E2E Tests (Playwright) ────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    # Only run E2E on PRs to main, not on every push to feature branches
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: datasphere_test
          POSTGRES_USER: datasphere
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: platform/backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: platform/backend
        env:
          APP_ENV: development
          SECRET_KEY: e2e-test-key
          DATABASE_URL: postgresql+psycopg2://datasphere:testpassword@localhost:5432/datasphere_test
          SCHEDULER_ENABLED: "false"
          CORS_ORIGINS: http://localhost:5173
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/api/v1/health || exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:4173
          E2E_API_URL: http://localhost:8000/api/v1
        run: |
          npm run preview &
          sleep 3
          npx playwright test --reporter=line

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: platform/frontend/playwright-report/
          retention-days: 7

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: All gates passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || \
                "${{ needs.frontend.result }}" != "success" || \
                "${{ needs.docker.result }}" != "success" ]]; then
            echo "One or more quality gates failed!"
            exit 1
          fi
          echo "✅ All quality gates passed — ready to merge"
