name: CI Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platform/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend sources
        run: python -m compileall app

      - name: Import FastAPI application
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///./ci.db
          CORS_ORIGINS: http://localhost:5173
        run: python -c "from app.main import app; print(app.title)"

      - name: Run backend API tests
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///./ci_test.db
          CORS_ORIGINS: http://localhost:5173
        run: pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platform/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build

  docker-compose:
    name: Docker Compose validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Docker Compose configuration
        run: docker compose config
